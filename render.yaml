services:
  - type: web
    name: east-coast-ebike-warranty
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: NOTIFY_URL
        value: https://bo-c4ded59a.base44.app/functions/sendClaimNotification
